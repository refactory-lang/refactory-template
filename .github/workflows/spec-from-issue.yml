# Triggered when an issue with 'needs-spec' label is assigned to Copilot or claude-bot.
# Runs claude-code to create a speckit specification from the issue.
#
# Prerequisites:
#   1. Add ANTHROPIC_API_KEY to repo/org secrets
#   2. Copilot must be enabled for the repo (Settings → Copilot → Enable)
#
# Usage:
#   Assign an issue labeled 'needs-spec' to 'copilot' (or 'claude-bot') → spec is auto-created

name: Spec from Issue

on:
  issues:
    types: [assigned]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  create-spec:
    # Run when assigned to copilot or claude-bot AND has needs-spec label
    if: |
      (github.event.assignee.login == 'copilot' || github.event.assignee.login == 'Copilot' || github.event.assignee.login == 'claude-bot') &&
      contains(github.event.issue.labels.*.name, 'needs-spec')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run spec-from-issue
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          claude-code --print \
            "/spec-from-issue $ISSUE_URL" \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,Skill"

      - name: Push spec branch
        run: |
          # claude-code will have created the branch locally
          # Push it to origin
          BRANCH=$(git branch --show-current)
          if [ "$BRANCH" != "master" ] && [ "$BRANCH" != "main" ]; then
            git push -u origin "$BRANCH"
          fi
