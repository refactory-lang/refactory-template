# When an issue is labeled 'spec-ready', auto-assign to Copilot
# so it creates the spec automatically.

name: Spec Ready — Assign to Copilot

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  assign-copilot:
    if: github.event.label.name == 'spec-ready'
    runs-on: ubuntu-latest
    steps:
      - name: Assign Copilot and comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;

            // Assign Copilot to the issue
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: ['copilot'],
            });

            // Comment with what's happening
            const body = [
              `### Specification in progress`,
              ``,
              `Copilot has been assigned to create a formal spec from this issue.`,
              ``,
              `It will:`,
              `1. Create a feature branch under \`specs/\``,
              `2. Write the specification following the speckit template`,
              `3. Open a PR and comment back here with the spec location`,
              ``,
              `**Manual alternative**: Run \`/spec-from-issue ${issue.html_url}\` in a repo checkout.`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: body,
            });
