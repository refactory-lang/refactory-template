# When an issue is labeled 'spec-ready', comment with instructions
# for creating the spec (manually or by assigning to claude-bot).

name: Spec Ready Notification

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  notify:
    if: github.event.label.name == 'spec-ready'
    runs-on: ubuntu-latest
    steps:
      - name: Comment with instructions
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = [
              `### Ready for specification`,
              ``,
              `This issue is ready to be converted into a formal spec. Two options:`,
              ``,
              `**Option A — Automated**: Assign this issue to \`claude-bot\` and the spec will be created automatically.`,
              ``,
              `**Option B — Manual**: Run in the repo checkout:`,
              `\`\`\``,
              `/spec-from-issue ${issue.html_url}`,
              `\`\`\``,
              ``,
              `The spec will be created on a feature branch under \`specs/\` and linked back here.`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: body,
            });
